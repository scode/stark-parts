name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  # This output deliberately asks whether anything outside the two generated catalog artifacts changed. `false`
  # therefore means the change is catalog-only and can take the lightweight validation path at the end of this file.
  changes:
    runs-on: ubicloud
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            app:
              - "**"
              - "!catalog/stark-parts.json5"
              - "!catalog/BUILD_RECEIPT.md"

  fmt:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy

  test:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  dprint:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting with dprint
        uses: dprint/check@v2.3

  static-build:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14
      - run: npm ci
      - run: NO_COLOR=true trunk build --release
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  catalog-check:
    needs: changes
    if: needs.changes.outputs.app != 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test -p stark-parts-catalog
      - name: Check generated file formatting
        uses: dprint/check@v2.3
